<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DBee 🐝 - Your Study Companion</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      padding: 15px;
      font-size: 1.6em;
      font-weight: 600;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3);
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
    }

    .message {
      padding: 12px 18px;
      border-radius: 18px;
      margin: 10px 0;
      max-width: 75%;
      font-size: 1em;
      line-height: 1.4;
      animation: fadeIn 0.25s ease;
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      border-bottom-right-radius: 0;
      box-shadow: 0 0 10px rgba(0, 183, 255, 0.4);
    }

    .bot {
      align-self: flex-start;
      background: linear-gradient(90deg, #8e2de2, #4a00e0);
      border-bottom-left-radius: 0;
      box-shadow: 0 0 10px rgba(138, 43, 226, 0.4);
    }

    #controls {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 15px;
      background: rgba(0,0,0,0.5);
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    input {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 25px;
      background: #1f2937;
      color: #fff;
      font-size: 1em;
      outline: none;
      margin-right: 10px;
      transition: 0.3s;
    }

    input:focus { background: #374151; }

    button {
      width: 55px;
      height: 55px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, #0072ff, #00c6ff);
      color: white;
      font-size: 1.5em;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(0, 183, 255, 0.7);
      transition: 0.3s;
    }

    button:hover { transform: scale(1.1); }

    button.listening {
      background: radial-gradient(circle, #ff1744, #d50000);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0.8; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Typing dots animation */
    .typing {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 10px 0;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: #bbb;
      border-radius: 50%;
      margin: 0 3px;
      animation: blink 1s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(1); }
      40% { opacity: 1; transform: scale(1.3); }
    }

    /* Scrollbar styling */
    #chat::-webkit-scrollbar {
      width: 6px;
    }
    #chat::-webkit-scrollbar-thumb {
      background: #0072ff;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <header>🐝 DBee - Study Companion</header>
  <div id="chat"></div>

  <div id="controls">
    <input id="userInput" placeholder="Type or say something..." />
    <button id="micBtn">🎙️</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const micBtn = document.getElementById('micBtn');
    const userInput = document.getElementById('userInput');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-IN';
    recognition.continuous = false;

    // Add message bubble
    function addMessage(text, sender) {
      const msg = document.createElement('div');
      msg.classList.add('message', sender);
      msg.textContent = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    // Add typing animation
    function showTyping() {
      const typingDiv = document.createElement('div');
      typingDiv.classList.add('typing', 'bot');
      typingDiv.innerHTML = '<span></span><span></span><span></span>';
      chat.appendChild(typingDiv);
      chat.scrollTop = chat.scrollHeight;
      return typingDiv;
    }

    async function sendToBot(text) {
      addMessage(text, 'user');
      const typingIndicator = showTyping();

      try {
        const res = await fetch('http://localhost:3000/query', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ query: text })
        });

        const data = await res.json();
        const reply = data.reply || "Sorry, I didn’t catch that.";

        typingIndicator.remove();
        addMessage(reply, 'bot');

        // Speak response
        const utter = new SpeechSynthesisUtterance(reply);
        utter.lang = 'en-IN';
        speechSynthesis.speak(utter);
      } catch (err) {
        typingIndicator.remove();
        addMessage("⚠️ Connection error. Please try again.", 'bot');
        console.error(err);
      }
    }

    // Mic button logic
    micBtn.onclick = () => {
      micBtn.classList.add('listening');
      recognition.start();
    };

    recognition.onresult = (event) => {
      micBtn.classList.remove('listening');
      const text = event.results[0][0].transcript;
      sendToBot(text);
    };

    recognition.onend = () => micBtn.classList.remove('listening');

    // Handle Enter key
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && userInput.value.trim()) {
        sendToBot(userInput.value);
        userInput.value = '';
      }
    });
  </script>
</body>
</html>
